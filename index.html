<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>نظام مراقبة انتهاء المنتجات الغذائية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:Tahoma,Arial,sans-serif;
  background:#f0f2f5;
  padding:15px;
  color:#1a1a1a;
}

.container{
  max-width:1400px;
  margin:auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-size:22px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-bottom:20px;
}

.card{
  padding:18px 10px;
  border-radius:14px;
  color:#fff;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.card-title{
  font-size:15px;
  font-weight:bold;
  margin-bottom:8px;
}

.card-count{
  font-size:36px;
  font-weight:bold;
}

.card-total{background:#2563eb;}
.card-good{background:#16a34a;}
.card-near{background:#eab308;color:#000;}
.card-danger{background:#f97316;}
.card-expired{background:#dc2626;}

.form-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:12px;
}

input,.btn{
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:#2563eb;
}

.btn{
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-blue{background:#2563eb;}
.btn-green{background:#16a34a;}
.btn-red{background:#dc2626;}
.btn-orange{background:#f97316;}
.btn-gray{background:#64748b;}

.search-box{
  width:100%;
  margin:12px 0;
}

.filter-btns{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:15px;
  justify-content:center;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:14px;
}

th,td{
  border:1px solid #e5e7eb;
  padding:10px 8px;
  text-align:center;
}

th{
  background:#1e293b;
  color:#fff;
}

.good-row{background:#dcfce7;}
.near-row{background:#fef9c3;}
.danger-row{background:#ffedd5;}
.expired-row{
  background:#fee2e2;
  color:#991b1b;
  font-weight:bold;
}

.actions-btn{
  padding:5px 10px;
  margin:2px;
  border-radius:6px;
  font-size:12px;
  border:none;
  cursor:pointer;
  color:#fff;
}

.empty-msg{
  text-align:center;
  padding:40px;
  color:#6b7280;
  font-size:16px;
}

@media(max-width:600px){

  .cards{
    grid-template-columns:repeat(2,1fr);
  }

  .form-row{
    grid-template-columns:1fr;
  }

  th,td{
    padding:8px 4px;
    font-size:12px;
  }

}

</style>
</head>
<body>

<div class="container" id="reportArea">

<h2>📦 نظام مراقبة انتهاء المنتجات الغذائية</h2>

<!-- CARDS -->

<div class="cards">

<div class="card card-total">
<div class="card-title">إجمالي المنتجات</div>
<div class="card-count" id="totalCount">0</div>
</div>

<div class="card card-good">
<div class="card-title">السليمة</div>
<div class="card-count" id="goodCount">0</div>
</div>

<div class="card card-near">
<div class="card-title">قريب انتهاء</div>
<div class="card-count" id="nearCount">0</div>
</div>

<div class="card card-danger">
<div class="card-title">خطر</div>
<div class="card-count" id="dangerCount">0</div>
</div>

<div class="card card-expired">
<div class="card-title">منتهي</div>
<div class="card-count" id="expiredCount">0</div>
</div>

</div>

<!-- FORM -->

<div class="form-row">

<input type="text" id="productName" placeholder="اسم المنتج">

<input type="number" id="quantity" placeholder="الكمية" value="1">

<input type="text" id="barcode" placeholder="الباركود">

<input type="date" id="expiryDate">

<div class="btn btn-blue" onclick="openScannerPage()">
📷 امسح الباركود
</div>

<div class="btn btn-green" onclick="doAddProduct()">
➕ إضافة المنتج
</div>

</div>

<!-- SEARCH -->

<input
type="text"
class="search-box"
id="searchInput"
placeholder="🔍 بحث باسم المنتج أو الباركود"
oninput="renderTable()"
>

<!-- FILTERS -->

<div class="filter-btns">

<div class="btn btn-gray" onclick="setFilter('all')">
عرض الكل
</div>

<div class="btn btn-green" onclick="setFilter('سليم')">
السليمة
</div>

<div class="btn" style="background:#eab308;color:#000;" onclick="setFilter('قريب انتهاء')">
قريب انتهاء
</div>

<div class="btn btn-orange" onclick="setFilter('خطر')">
الخطر
</div>

<div class="btn btn-red" onclick="setFilter('منتهي')">
المنتهية
</div>

<div class="btn btn-green" onclick="exportExcel()">
📊 تصدير Excel
</div>

<div class="btn btn-red" onclick="exportPDF()">
📄 تصدير PDF
</div>

</div>

<!-- TABLE -->

<table>

<thead>
<tr>
<th>#</th>
<th>اسم المنتج</th>
<th>الكمية</th>
<th>الباركود</th>
<th>الانتهاء</th>
<th>المتبقي</th>
<th>الحالة</th>
<th>الإجراء</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="empty-msg" id="emptyMsg" style="display:none;">
لا توجد منتجات
</div>

</div>

<script>

// ===== DATA =====

var products=[];

try{

  var stored=localStorage.getItem("expiryProducts");

  if(stored){
    products=JSON.parse(stored);
  }

}catch(e){
  products=[];
}

var currentFilter="all";
var editIndex=null;

// ===== SAVE =====

function saveData(){
  localStorage.setItem("expiryProducts",JSON.stringify(products));
}

// ===== DAYS =====

function calcDays(dateStr){

  var today=new Date();
  today.setHours(0,0,0,0);

  var expiry=new Date(dateStr);
  expiry.setHours(0,0,0,0);

  return Math.ceil((expiry-today)/(1000*60*60*24));

}

// ===== STATUS =====

function getStatus(days){

  if(days<0) return "منتهي";

  if(days<=7) return "خطر";

  if(days<=30) return "قريب انتهاء";

  return "سليم";

}

// ===== ROW COLOR =====

function getRowClass(status){

  if(status==="منتهي") return "expired-row";

  if(status==="خطر") return "danger-row";

  if(status==="قريب انتهاء") return "near-row";

  return "good-row";

}

// ===== ADD PRODUCT =====

function doAddProduct(){

  var name=document.getElementById("productName").value.trim();

  var quantity=parseInt(document.getElementById("quantity").value || 1);

  var barcode=document.getElementById("barcode").value.trim();

  var expiryDate=document.getElementById("expiryDate").value;

  if(!barcode){

    alert("⚠️ قم بإدخال الباركود");

    return;

  }

  if(!expiryDate){

    alert("⚠️ حدد تاريخ الانتهاء");

    return;

  }

  // فحص التكرار

  var existingIndex=products.findIndex(function(p){

    return p.barcode===barcode;

  });

  // إذا المنتج موجود

  if(existingIndex!==-1 && editIndex===null){

    products[existingIndex].quantity=
    parseInt(products[existingIndex].quantity || 0)+quantity;

    if(name){
      products[existingIndex].name=name;
    }

    products[existingIndex].expiryDate=expiryDate;

    alert("✅ المنتج موجود مسبقاً وتمت زيادة الكمية");

  }else{

    var item={

      name:name || ("منتج "+barcode),

      quantity:quantity,

      barcode:barcode,

      expiryDate:expiryDate

    };

    if(editIndex!==null){

      products[editIndex]=item;

      editIndex=null;

      alert("✅ تم تعديل المنتج");

    }else{

      products.push(item);

      alert("✅ تمت إضافة المنتج");

    }

  }

  document.getElementById("productName").value="";
  document.getElementById("quantity").value="1";
  document.getElementById("barcode").value="";
  document.getElementById("expiryDate").value="";

  saveData();

  renderTable();

}

// ===== TABLE =====

function renderTable(){

  var tbody=document.getElementById("tableBody");

  var search=document.getElementById("searchInput").value.toLowerCase().trim();

  tbody.innerHTML="";

  var total=0;
  var good=0;
  var near=0;
  var danger=0;
  var expired=0;

  var visibleCount=0;

  for(var i=0;i<products.length;i++){

    var p=products[i];

    var days=calcDays(p.expiryDate);

    var status=getStatus(days);

    total++;

    if(status==="سليم") good++;
    else if(status==="قريب انتهاء") near++;
    else if(status==="خطر") danger++;
    else if(status==="منتهي") expired++;

    var matchSearch=
    !search ||
    p.name.toLowerCase().includes(search) ||
    p.barcode.toLowerCase().includes(search);

    var matchFilter=
    currentFilter==="all" ||
    status===currentFilter;

    if(matchSearch && matchFilter){

      visibleCount++;

      var tr=document.createElement("tr");

      tr.className=getRowClass(status);

      tr.innerHTML=`

      <td>${i+1}</td>

      <td>${escapeHtml(p.name)}</td>

      <td>${p.quantity}</td>

      <td>${escapeHtml(p.barcode)}</td>

      <td>${p.expiryDate}</td>

      <td>${days}</td>

      <td>${status}</td>

      <td>

      <button
      class="actions-btn"
      style="background:#2563eb;"
      onclick="editProduct(${i})">
      تعديل
      </button>

      <button
      class="actions-btn"
      style="background:#dc2626;"
      onclick="deleteProduct(${i})">
      حذف
      </button>

      </td>

      `;

      tbody.appendChild(tr);

    }

  }

  document.getElementById("totalCount").textContent=total;
  document.getElementById("goodCount").textContent=good;
  document.getElementById("nearCount").textContent=near;
  document.getElementById("dangerCount").textContent=danger;
  document.getElementById("expiredCount").textContent=expired;

  document.getElementById("emptyMsg").style.display=
  visibleCount===0 ? "block":"none";

}

// ===== ESCAPE =====

function escapeHtml(text){

  var div=document.createElement("div");

  div.textContent=text;

  return div.innerHTML;

}

// ===== EDIT =====

function editProduct(index){

  var p=products[index];

  document.getElementById("productName").value=p.name;

  document.getElementById("quantity").value=p.quantity;

  document.getElementById("barcode").value=p.barcode;

  document.getElementById("expiryDate").value=p.expiryDate;

  editIndex=index;

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

// ===== DELETE =====

function deleteProduct(index){

  if(confirm("هل تريد حذف المنتج؟")){

    products.splice(index,1);

    saveData();

    renderTable();

  }

}

// ===== FILTER =====

function setFilter(status){

  currentFilter=status;

  renderTable();

}

// ===== SCANNER =====

function openScannerPage(){

  var scanWindow=window.open("","_blank","width=500,height=700");

  var html=`

<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ماسح الباركود</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"><\/script>

<style>

body{
  margin:0;
  background:#000;
  overflow:hidden;
}

#reader{
  width:100vw;
  height:100vh;
}

.scan-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:260px;
  height:260px;
  border:4px solid #fff;
  border-radius:25px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.5);
}

</style>

</head>

<body>

<div id="reader"></div>

<div class="scan-box"></div>

<script>

var scanner=new Html5Qrcode("reader");

scanner.start(

{ facingMode:"environment" },

{
fps:20,
qrbox:{ width:250,height:250 }
},

function(decodedText){

window.opener.document.getElementById("barcode").value=decodedText;

if(navigator.vibrate){
navigator.vibrate(300);
}

scanner.stop();

window.close();

},

function(error){}

);

<\/script>

</body>

</html>

`;

  scanWindow.document.write(html);

}

// ===== EXPORT EXCEL =====

function exportExcel(){

  var data=[];

  for(var i=0;i<products.length;i++){

    var p=products[i];

    var days=calcDays(p.expiryDate);

    var status=getStatus(days);

    data.push({

      "م":i+1,

      "اسم المنتج":p.name,

      "الكمية":p.quantity,

      "الباركود":p.barcode,

      "تاريخ الانتهاء":p.expiryDate,

      "المتبقي":days,

      "الحالة":status

    });

  }

  var ws=XLSX.utils.json_to_sheet(data);

  var wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,"المنتجات");

  XLSX.writeFile(wb,"تقرير_المنتجات.xlsx");

}

// ===== EXPORT PDF =====

function exportPDF(){

  var area=document.getElementById("reportArea");

  html2canvas(area,{ scale:2 }).then(function(canvas){

    var imgData=canvas.toDataURL("image/png");

    var pdf=new jspdf.jsPDF("l","mm","a4");

    var width=pdf.internal.pageSize.getWidth();

    var height=canvas.height*width/canvas.width;

    pdf.addImage(imgData,"PNG",0,0,width,height);

    pdf.save("تقرير_المنتجات.pdf");

  });

}

// ===== START =====

renderTable();

</script>

</body>
</html>
