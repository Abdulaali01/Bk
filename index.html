<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام مراقبة انتهاء المنتجات الغذائية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Tahoma;
}

body{
  background:#f3f4f6;
  padding:15px;
}

.container{
  max-width:1400px;
  margin:auto;
  background:#fff;
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.card{
  padding:20px;
  border-radius:12px;
  text-align:center;
  color:#fff;
  font-weight:bold;
}

.card div:last-child{
  font-size:35px;
  margin-top:10px;
}

.total{background:#2563eb;}
.good{background:#16a34a;}
.near{background:#eab308;color:#000;}
.danger{background:#f97316;}
.expired{background:#dc2626;}

.form-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:10px;
  margin-bottom:15px;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

button{
  border:none;
  cursor:pointer;
  color:#fff;
  font-weight:bold;
}

.btn-add{background:#16a34a;}
.btn-scan{background:#2563eb;}
.btn-export{background:#dc2626;}

.search{
  width:100%;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  background:#1e293b;
  color:#fff;
}

.good-row{background:#dcfce7;}
.near-row{background:#fef9c3;}
.danger-row{background:#ffedd5;}
.expired-row{
  background:#fee2e2;
  color:#991b1b;
  font-weight:bold;
}

.action-btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  color:#fff;
  cursor:pointer;
  margin:2px;
}

.edit-btn{background:#2563eb;}
.delete-btn{background:#dc2626;}

@media(max-width:700px){

  table{
    font-size:12px;
  }

  th,td{
    padding:6px;
  }

}

</style>
</head>
<body>

<div class="container">

<h2>📦 نظام مراقبة انتهاء المنتجات الغذائية</h2>

<!-- CARDS -->

<div class="cards">

<div class="card total">
<div>إجمالي المنتجات</div>
<div id="totalCount">0</div>
</div>

<div class="card good">
<div>السليمة</div>
<div id="goodCount">0</div>
</div>

<div class="card near">
<div>قريب انتهاء</div>
<div id="nearCount">0</div>
</div>

<div class="card danger">
<div>خطر</div>
<div id="dangerCount">0</div>
</div>

<div class="card expired">
<div>منتهي</div>
<div id="expiredCount">0</div>
</div>

</div>

<!-- FORM -->

<div class="form-row">

<input type="text" id="productName" placeholder="اسم المنتج">

<input type="number" id="quantity" value="1" placeholder="الكمية">

<input type="text" id="barcode" placeholder="الباركود">

<input type="date" id="expiryDate">

<button class="btn-scan" onclick="openScanner()">
📷 مسح باركود
</button>

<button class="btn-add" onclick="doAddProduct()">
➕ إضافة المنتج
</button>

</div>

<!-- SEARCH -->

<input
type="text"
id="searchInput"
class="search"
placeholder="🔍 بحث"
oninput="renderTable()"
>

<!-- EXPORT -->

<div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;">

<button class="btn-export" onclick="exportExcel()">
📊 تصدير Excel
</button>

</div>

<!-- TABLE -->

<table>

<thead>

<tr>

<th>#</th>

<th>اسم المنتج</th>

<th>الكمية</th>

<th>الباركود</th>

<th>تاريخ الانتهاء</th>

<th>المتبقي</th>

<th>الحالة</th>

<th>الإجراء</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

// ===== DATA =====

var products=[];

try{

  var stored=localStorage.getItem("expiryProducts");

  if(stored){

    products=JSON.parse(stored);

  }

}catch(e){

  products=[];

}

var editIndex=null;

// ===== SAVE =====

function saveData(){

  localStorage.setItem(
    "expiryProducts",
    JSON.stringify(products)
  );

}

// ===== DAYS =====

function calcDays(dateStr){

  var today=new Date();

  today.setHours(0,0,0,0);

  var expiry=new Date(dateStr);

  expiry.setHours(0,0,0,0);

  return Math.ceil(
    (expiry-today)/(1000*60*60*24)
  );

}

// ===== STATUS =====

function getStatus(days){

  if(days<0) return "منتهي";

  if(days<=7) return "خطر";

  if(days<=30) return "قريب انتهاء";

  return "سليم";

}

// ===== CLASS =====

function getRowClass(status){

  if(status==="منتهي") return "expired-row";

  if(status==="خطر") return "danger-row";

  if(status==="قريب انتهاء") return "near-row";

  return "good-row";

}

// ===== ADD PRODUCT =====

function doAddProduct(){

  var name=document.getElementById("productName")
  .value
  .trim();

  var quantity=parseInt(
    document.getElementById("quantity").value || 1
  );

  // تنظيف الباركود
  var barcode=document.getElementById("barcode")
  .value
  .trim()
  .replace(/\s+/g,'');

  var expiryDate=document.getElementById("expiryDate")
  .value;

  if(!barcode){

    alert("⚠️ أدخل الباركود");

    return;

  }

  if(!expiryDate){

    alert("⚠️ حدد تاريخ الانتهاء");

    return;

  }

  // البحث عن المنتج
  var existingIndex=-1;

  for(var i=0;i<products.length;i++){

    var savedBarcode=String(products[i].barcode)
    .trim()
    .replace(/\s+/g,'');

    if(savedBarcode===barcode){

      existingIndex=i;

      break;

    }

  }

  // إذا موجود
  if(existingIndex!==-1 && editIndex===null){

    products[existingIndex].quantity=
    parseInt(products[existingIndex].quantity || 0)
    + quantity;

    if(name){

      products[existingIndex].name=name;

    }

    products[existingIndex].expiryDate=expiryDate;

    saveData();

    renderTable();

    clearInputs();

    alert("✅ المنتج موجود وتمت زيادة الكمية فقط");

    return;

  }

  // منتج جديد
  var item={

    name:name || ("منتج "+barcode),

    quantity:quantity,

    barcode:barcode,

    expiryDate:expiryDate

  };

  // تعديل
  if(editIndex!==null){

    products[editIndex]=item;

    editIndex=null;

    alert("✅ تم تعديل المنتج");

  }else{

    products.push(item);

    alert("✅ تمت إضافة المنتج");

  }

  saveData();

  renderTable();

  clearInputs();

}

// ===== CLEAR =====

function clearInputs(){

  document.getElementById("productName").value="";

  document.getElementById("quantity").value="1";

  document.getElementById("barcode").value="";

  document.getElementById("expiryDate").value="";

}

// ===== TABLE =====

function renderTable(){

  var tbody=document.getElementById("tableBody");

  var search=document.getElementById("searchInput")
  .value
  .toLowerCase()
  .trim();

  tbody.innerHTML="";

  var total=0;
  var good=0;
  var near=0;
  var danger=0;
  var expired=0;

  for(var i=0;i<products.length;i++){

    var p=products[i];

    var days=calcDays(p.expiryDate);

    var status=getStatus(days);

    total++;

    if(status==="سليم") good++;

    else if(status==="قريب انتهاء") near++;

    else if(status==="خطر") danger++;

    else if(status==="منتهي") expired++;

    var match=
    !search ||
    p.name.toLowerCase().includes(search) ||
    p.barcode.toLowerCase().includes(search);

    if(match){

      var tr=document.createElement("tr");

      tr.className=getRowClass(status);

      tr.innerHTML=`

      <td>${i+1}</td>

      <td>${p.name}</td>

      <td>${p.quantity}</td>

      <td>${p.barcode}</td>

      <td>${p.expiryDate}</td>

      <td>${days}</td>

      <td>${status}</td>

      <td>

      <button
      class="action-btn edit-btn"
      onclick="editProduct(${i})">
      تعديل
      </button>

      <button
      class="action-btn delete-btn"
      onclick="deleteProduct(${i})">
      حذف
      </button>

      </td>

      `;

      tbody.appendChild(tr);

    }

  }

  document.getElementById("totalCount").textContent=total;

  document.getElementById("goodCount").textContent=good;

  document.getElementById("nearCount").textContent=near;

  document.getElementById("dangerCount").textContent=danger;

  document.getElementById("expiredCount").textContent=expired;

}

// ===== EDIT =====

function editProduct(index){

  var p=products[index];

  document.getElementById("productName").value=p.name;

  document.getElementById("quantity").value=p.quantity;

  document.getElementById("barcode").value=p.barcode;

  document.getElementById("expiryDate").value=p.expiryDate;

  editIndex=index;

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

// ===== DELETE =====

function deleteProduct(index){

  if(confirm("هل تريد حذف المنتج؟")){

    products.splice(index,1);

    saveData();

    renderTable();

  }

}

// ===== EXPORT =====

function exportExcel(){

  var data=[];

  for(var i=0;i<products.length;i++){

    var p=products[i];

    var days=calcDays(p.expiryDate);

    var status=getStatus(days);

    data.push({

      "م":i+1,

      "اسم المنتج":p.name,

      "الكمية":p.quantity,

      "الباركود":p.barcode,

      "تاريخ الانتهاء":p.expiryDate,

      "المتبقي":days,

      "الحالة":status

    });

  }

  var ws=XLSX.utils.json_to_sheet(data);

  var wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    "المنتجات"
  );

  XLSX.writeFile(
    wb,
    "تقرير_المنتجات.xlsx"
  );

}

// ===== SCANNER =====

function openScanner(){

  var scanWindow=window.open(
    "",
    "_blank",
    "width=500,height=700"
  );

  var html=`

<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"><\/script>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
}

#reader{
width:100vw;
height:100vh;
}

</style>

</head>

<body>

<div id="reader"></div>

<script>

var scanner=new Html5Qrcode("reader");

scanner.start(

{facingMode:"environment"},

{
fps:20,
qrbox:{width:250,height:250}
},

function(decodedText){

window.opener.document
.getElementById("barcode")
.value=decodedText;

scanner.stop();

window.close();

},

function(err){}

);

<\/script>

</body>

</html>

`;

  scanWindow.document.write(html);

}

// ===== START =====

renderTable();

</script>

</body>
</html>
