<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>نظام مراقبة انتهاء المنتجات</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Tahoma,Arial;
background:#f4f6f9;
margin:0;
padding:15px;
color:#111;
}

.box{
max-width:1350px;
margin:auto;
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 5px 20px #0001;
}

h2{
text-align:center;
margin:5px 0 20px;
color:#0f172a;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-bottom:15px;
}

.card{
padding:16px;
border-radius:14px;
text-align:center;
color:#fff;
font-weight:bold;
}

.total{background:#2563eb}
.good{background:#16a34a}
.near{background:#eab308}
.danger{background:#f97316}
.expired{background:#dc2626}

.card span{
display:block;
font-size:30px;
margin-top:8px;
}

.controls{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:8px;
margin-bottom:12px;
}

input,button{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
border:none;
cursor:pointer;
background:#2563eb;
color:#fff;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.btn-red{
background:#dc2626;
}

.btn-green{
background:#16a34a;
}

.btn-gray{
background:#64748b;
}

.btn-orange{
background:#f97316;
}

.search{
width:100%;
margin:10px 0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:9px;
text-align:center;
font-size:14px;
}

th{
background:#0f172a;
color:#fff;
}

tr.good-row{
background:#dcfce7;
}

tr.near-row{
background:#fef9c3;
}

tr.danger-row{
background:#ffedd5;
}

tr.expired-row{
background:#fee2e2;
color:#991b1b;
font-weight:bold;
}

.actions button{
padding:6px 10px;
margin:2px;
font-size:13px;
}

#reader{
width:320px;
margin:15px auto;
display:none;
}

@media(max-width:700px){

table{
font-size:12px;
}

th,td{
padding:6px;
}

}

</style>
</head>

<body>

<div class="box" id="reportArea">

<h2>📦 نظام مراقبة انتهاء المنتجات الغذائية</h2>

<div class="cards">

<div class="card total">
إجمالي المنتجات
<span id="totalCount">0</span>
</div>

<div class="card good">
سليم
<span id="goodCount">0</span>
</div>

<div class="card near">
قريب انتهاء
<span id="nearCount">0</span>
</div>

<div class="card danger">
خطر
<span id="dangerCount">0</span>
</div>

<div class="card expired">
منتهي
<span id="expiredCount">0</span>
</div>

</div>

<div class="controls">

<input id="productName" placeholder="اسم المنتج">

<input id="quantity" type="number" placeholder="الكمية">

<input id="barcode" placeholder="الباركود">

<input id="expiryDate" type="date">

<button onclick="addProduct()">➕ إضافة المنتج</button>

<button onclick="startBarcode()">📷 قراءة باركود</button>

</div>

<div id="reader"></div>

<input
class="search"
id="searchInput"
oninput="renderTable()"
placeholder="🔍 بحث باسم المنتج أو الباركود">

<div class="controls">

<button onclick="filterStatus('all')" class="btn-gray">
عرض الكل
</button>

<button onclick="filterStatus('سليم')" class="btn-green">
السليمة
</button>

<button onclick="filterStatus('قريب انتهاء')" class="btn-orange">
قريبة الانتهاء
</button>

<button onclick="filterStatus('خطر')" class="btn-orange">
الخطر
</button>

<button onclick="filterStatus('منتهي')" class="btn-red">
المنتهية
</button>

<button onclick="exportExcel()" class="btn-green">
📊 تصدير Excel
</button>

<button onclick="exportPDF()" class="btn-red">
📄 تصدير PDF
</button>

<button onclick="clearAll()" class="btn-red">
🗑️ حذف الكل
</button>

</div>

<table id="productsTable">

<thead>

<tr>
<th>#</th>
<th>اسم المنتج</th>
<th>الكمية</th>
<th>الباركود</th>
<th>تاريخ الانتهاء</th>
<th>الأيام المتبقية</th>
<th>الحالة</th>
<th>إجراء</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

let products =
JSON.parse(localStorage.getItem("expiryProducts") || "[]");

let currentFilter = "all";

let editIndex = null;

function saveData(){

localStorage.setItem(
"expiryProducts",
JSON.stringify(products)
);

}

function getStatus(days){

if(days < 0) return "منتهي";

if(days <= 7) return "خطر";

if(days <= 30) return "قريب انتهاء";

return "سليم";

}

function getRowClass(status){

if(status === "منتهي") return "expired-row";

if(status === "خطر") return "danger-row";

if(status === "قريب انتهاء") return "near-row";

return "good-row";

}

function calcDays(date){

const today = new Date();

today.setHours(0,0,0,0);

const expiry = new Date(date);

expiry.setHours(0,0,0,0);

return Math.ceil(
(expiry - today) / (1000 * 60 * 60 * 24)
);

}

function addProduct(){

const name =
document.getElementById("productName").value.trim();

const quantity =
document.getElementById("quantity").value;

const barcode =
document.getElementById("barcode").value.trim();

const expiryDate =
document.getElementById("expiryDate").value;

if(!name || !quantity || !expiryDate){

alert("أدخل البيانات كاملة");

return;

}

const item = {
name,
quantity,
barcode,
expiryDate
};

if(editIndex !== null){

products[editIndex] = item;

editIndex = null;

}else{

products.push(item);

}

document.getElementById("productName").value = "";

document.getElementById("quantity").value = "";

document.getElementById("barcode").value = "";

document.getElementById("expiryDate").value = "";

saveData();

renderTable();

}

function renderTable(){

const tbody =
document.querySelector("#productsTable tbody");

tbody.innerHTML = "";

const search =
document.getElementById("searchInput")
.value
.trim()
.toLowerCase();

let total=0;
let good=0;
let near=0;
let danger=0;
let expired=0;

products.forEach((p,index)=>{

const days = calcDays(p.expiryDate);

const status = getStatus(days);

total++;

if(status==="سليم") good++;

if(status==="قريب انتهاء") near++;

if(status==="خطر") danger++;

if(status==="منتهي") expired++;

const matchSearch =
p.name.toLowerCase().includes(search) ||
(p.barcode || "").toLowerCase().includes(search);

const matchFilter =
currentFilter === "all" ||
status === currentFilter;

if(matchSearch && matchFilter){

const tr = document.createElement("tr");

tr.className = getRowClass(status);

tr.innerHTML = `

<td>${index+1}</td>

<td>${p.name}</td>

<td>${p.quantity}</td>

<td>${p.barcode || "-"}</td>

<td>${p.expiryDate}</td>

<td>${days}</td>

<td>${status}</td>

<td class="actions">

<button onclick="editProduct(${index})">
تعديل
</button>

<button class="btn-red"
onclick="deleteProduct(${index})">
حذف
</button>

</td>

`;

tbody.appendChild(tr);

}

});

document.getElementById("totalCount").textContent = total;

document.getElementById("goodCount").textContent = good;

document.getElementById("nearCount").textContent = near;

document.getElementById("dangerCount").textContent = danger;

document.getElementById("expiredCount").textContent = expired;

}

function editProduct(index){

const p = products[index];

document.getElementById("productName").value = p.name;

document.getElementById("quantity").value = p.quantity;

document.getElementById("barcode").value = p.barcode;

document.getElementById("expiryDate").value = p.expiryDate;

editIndex = index;

}

function deleteProduct(index){

if(confirm("هل تريد حذف المنتج؟")){

products.splice(index,1);

saveData();

renderTable();

}

}

function clearAll(){

if(confirm("سيتم حذف جميع المنتجات")){

products = [];

saveData();

renderTable();

}

}

function filterStatus(status){

currentFilter = status;

renderTable();

}

function exportExcel(){

const data = products.map((p,i)=>{

const days = calcDays(p.expiryDate);

const status = getStatus(days);

return {

"م": i+1,
"اسم المنتج": p.name,
"الكمية": p.quantity,
"الباركود": p.barcode,
"تاريخ الانتهاء": p.expiryDate,
"الأيام المتبقية": days,
"الحالة": status

};

});

const ws = XLSX.utils.json_to_sheet(data);

const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"تقرير المنتجات"
);

XLSX.writeFile(
wb,
"تقرير_المنتجات.xlsx"
);

}

function exportPDF(){

const area =
document.getElementById("reportArea");

html2canvas(area,{scale:2}).then(canvas=>{

const imgData =
canvas.toDataURL("image/png");

const pdf =
new jspdf.jsPDF("l","mm","a4");

const pageWidth =
pdf.internal.pageSize.getWidth();

const imgWidth = pageWidth;

const imgHeight =
canvas.height * imgWidth / canvas.width;

pdf.addImage(
imgData,
"PNG",
0,
0,
imgWidth,
imgHeight
);

pdf.save("تقرير_المنتجات.pdf");

});

}

function startBarcode(){

document.getElementById("reader").style.display = "block";

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(

{ facingMode: "environment" },

{
fps:10,
qrbox:250
},

(decodedText)=>{

document.getElementById("barcode").value =
decodedText;

html5QrCode.stop();

document.getElementById("reader").innerHTML = "";

document.getElementById("reader").style.display = "none";

alert("تم قراءة الباركود");

},

(errorMessage)=>{

}

);

}

window.onload = function(){

renderTable();

const warningCount =
products.filter(p=>{

const days = calcDays(p.expiryDate);

return days <= 7;

}).length;

if(warningCount > 0){

setTimeout(()=>{

alert(
"⚠️ يوجد "
+ warningCount +
" منتج منتهي أو قريب انتهاء"
);

},500);

}

}

</script>

</body>
</html>
